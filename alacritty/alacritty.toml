[env]
TERM = "xterm-256color"

[window]
opacity = 0.93
padding = { x = 2, y = 2 }

[font]
normal = { family = "Hack Nerd Font", style = "Regular" }
bold = { family = "Hack Nerd Font", style = "Bold" }
italic = { family = "Hack Nerd Font", style = "Italic" }
size = 16.0

[cursor]
style = { shape = "Block", blinking = "Off" }

[scrolling]
history = 10000
multiplier = 5

[colors.primary]
background = "#282828"
foreground = "#fbf1c7"

[colors.cursor]
text = "#282828"
cursor = "#fbf1c7"

[colors.normal]
black   = "#3c3836"
red     = "#fb4934"
green   = "#b8bb26"
yellow  = "#fabd2f"
blue    = "#83a598"
magenta = "#d3869b"
cyan    = "#8ec07c"
white   = "#ebdbb2"

[colors.bright]
black   = "#928374"
red     = "#fe8019"
green   = "#d4db46"
yellow  = "#ffe66b"
blue    = "#a9d4be"
magenta = "#f2b8d6"
cyan    = "#b5e0a3"
white   = "#fbf1c7"

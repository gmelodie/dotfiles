# ly display manager — amber CRT theme
# colors are 0xSSRRGGBB (SS = style byte, 00 = normal)

# amber text on near-black warm-brown background
# 0x80.. = TB_DIM style byte, softens the glare into a warmer CRT glow
fg = 0x80FFA000
bg = 0x000D0701
border_fg = 0x007A5500

# lean time in the top-right corner, rendered in the normal (thin) console font
# instead of ly's chunky hardcoded bigclock blocks
bigclock = none
clock = %H:%M

# no background animation, crisp box
animation = none
hide_borders = false
blank_box = true
full_color = true

# center the box
box_position_h = 0.5
box_position_v = 0.5
margin_box_h = 2
margin_box_v = 1

# password mask
asterisk = *
clear_password = true

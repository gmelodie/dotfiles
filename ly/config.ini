# ly display manager — amber CRT theme
#
# The bare Linux TTY can't render 24-bit color: the kernel down-maps every
# truecolor escape to a 16-entry palette. So instead of asking ly for amber
# truecolor (which would snap to a muddy default yellow), we run in 8-color
# mode and remap the console palette itself to amber via setvtrgb — see
# ../systemd/console-amber.service and ./amber-vtrgb. The real amber lives there.
#
# full_color = false → colors are 8-color termbox ids (0x01=black .. 0x08=white),
# which index the console palette slots we remap.
# fg=slot7 (0xFFA000 amber), bg=slot0 (0x0D0701 near-black warm),
# border_fg=slot1 (0x7A5500 dim amber) — RGB set in ../ly/amber-vtrgb.
full_color = false
fg = 0x08
bg = 0x01
border_fg = 0x02

# lean time in the top-right corner, rendered in the normal (thin) console font
# instead of ly's chunky hardcoded bigclock blocks
bigclock = none
clock = %H:%M

# no background animation, crisp box
animation = none
hide_borders = false
blank_box = true

# center the box
box_position_h = 0.5
box_position_v = 0.5
margin_box_h = 2
margin_box_v = 1

# password mask
asterisk = *
clear_password = true

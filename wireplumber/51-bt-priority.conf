# Bluetooth speaker session priority for WirePlumber 0.5, so the speakers are
# preferred as the default output, JotaBellas outranking Ultra Quicos. The
# bt-audio-autoconnect service enforces the same order actively and also wakes
# a speaker's amp on switch; this file is the declarative backup for priority.

monitor.bluez.rules = [
  {
    matches = [ { node.name = "~bluez_output.28_FA_19_6E_FD_B5.*" } ]   # JotaBellas
    actions = { update-props = { priority.session = 2200, priority.driver = 2200 } }
  }
  {
    matches = [ { node.name = "~bluez_output.BC_87_FA_A0_2A_4D.*" } ]   # Ultra Quicos
    actions = { update-props = { priority.session = 2000, priority.driver = 2000 } }
  }
]

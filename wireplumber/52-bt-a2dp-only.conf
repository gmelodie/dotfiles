# Force Bluetooth audio to A2DP only -- never negotiate the Handsfree/Headset
# (HFP/HSP) role. The Ultra Quicos headset would half-connect in Handsfree mode
# on link-up, leaving a dead A2DP transport: the sink showed up on a2dp-sink and
# RUNNING, but was silent, and only a full disconnect/reconnect recovered it
# (a profile bounce did not -- the breakage was at the BT link level). We never
# use any headset's built-in mic (the Blue Microphones is the capture device),
# so dropping HFP/HSP entirely removes the negotiation that triggered the bug.
#
# bluez5.roles      -- only advertise/enable the A2DP roles, so no headset
#                      profile is ever offered for any BT device.
# hfphsp-backend    -- disable the telephony (mSBC/CVSD) backend outright, belt
#                      and suspenders so nothing can bring HFP/HSP back.

monitor.bluez.properties = {
  bluez5.roles = [ a2dp_sink a2dp_source ]
  bluez5.hfphsp-backend = "none"
}
